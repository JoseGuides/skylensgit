<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento pix</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: black;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
 
    .pix-container { width: 100%; max-width: 520px; }
 
    .pix-card {
      background:black;
      border: 1px solid #00e5ff;
      border-radius: 16px;
      padding: 1.5rem;
    }
 
    .pix-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid ;
    }
 
    .pix-logo {
      width: 36px;
      height: 36px;
      background: #32bcad;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
 
    .pix-logo svg { width: 22px; height: 22px; }
 
    .pix-title { font-size: 17px; font-weight: 600; color: #00e5ff; }
    .pix-subtitle { font-size: 13px; color: #888; }
 
    .field-group { margin-bottom: 1rem; }
 
    .field-label {
      font-size: 11px;
      font-weight: 600;
      color: #00e5ff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      display: block;
    }
 
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #00e5ff;
      border-radius: 8px;
      font-size: 14px;
      color: #111;
      outline: none;
      transition: border-color 0.15s;
      background: #fff;
    }
 
    input[type="text"]:focus { border-color: #00e5ff; }
 
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
 
    .key-type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 6px;
    }
 
    .key-btn {
      border: 1px solid #00e5ff;
      border-radius: 8px;
      padding: 8px 4px;
      font-size: 13px;
      background: transparent;
      color: #00e5ff;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
 
    .key-btn:hover { background: #f4f4f0; color: #111; }
 
    .key-btn.active {
      border-color: #00e5ff;
      background: #e8f8f7;
      color: #00e5ff;
      font-weight: 600;
    }
 
    .key-btn.full { grid-column: span 4; }
 
    .generate-btn {
      width: 100%;
      margin-top: 1.25rem;
      padding: 12px;
      border-radius: 8px;
      background: #00e5ff;
      color: black;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
 
    .generate-btn:hover { opacity: 0.9; }
    .generate-btn:active { opacity: 0.8; transform: scale(0.99); }
 
    .error-msg {
      font-size: 12px;
      color: #c0392b;
      margin-top: 4px;
      display: none;
    }
 
    .qr-result {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e5e0;
      display: none;
    }
 
    .qr-result.show { display: block; }
 
    .qr-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
 
    .qr-box {
      background: white;
      border: 1px solid #e5e5e0;
      border-radius: 12px;
      padding: 16px;
    }
 
    .qr-info { text-align: center; }
    .qr-name { font-size: 15px; font-weight: 600; color: #111; }
    .qr-amount { font-size: 26px; font-weight: 600; color: #0f6e56; margin: 4px 0; }
    .qr-key { font-size: 12px; color: #888; font-family: monospace; }
 
    .copy-area { width: 100%; }
 
    .copy-code {
      width: 100%;
      font-family: monospace;
      font-size: 10px;
      background: #f4f4f0;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      resize: none;
      color: #555;
      height: 72px;
    }
 
    .copy-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid #ddd;
      color: #111;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }
 
    .copy-btn:hover { background: #f4f4f0; }
 
    @media (max-width: 400px) {
      .field-row { grid-template-columns: 1fr; }
      .key-type-grid { grid-template-columns: repeat(2, 1fr); }
      .key-btn.full { grid-column: span 2; }
    }
  </style>
</head>
<body>
 
<div class="pix-container">
  <div class="pix-card">
 
    <div class="pix-header">
      <div class="pix-logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6.5 6.5L11 2H13L17.5 6.5L13 11H11L6.5 6.5Z" fill="white" opacity="0.9"/>
          <path d="M6.5 17.5L2 13V11L6.5 6.5L11 11V13L6.5 17.5Z" fill="white" opacity="0.7"/>
          <path d="M17.5 6.5L22 11V13L17.5 17.5L13 13V11L17.5 6.5Z" fill="white" opacity="0.7"/>
          <path d="M6.5 17.5L11 22H13L17.5 17.5L13 13H11L6.5 17.5Z" fill="white" opacity="0.5"/>
        </svg>
      </div>
      <div>
        <div class="pix-title">PAGAMENTO VIA PIX</div>
      </div>
    </div>
 
    <div class="field-group">
      <span class="field-label">Tipo de chave Pix</span>
      <div class="key-type-grid">
        <button class="key-btn active" data-type="cpf">CPF</button>
        <button class="key-btn" data-type="cnpj">CNPJ</button>
        <button class="key-btn" data-type="phone">Telefone</button>
        <button class="key-btn" data-type="email">E-mail</button>
        <button class="key-btn full" data-type="random">Chave aleatória (EVP)</button>
      </div>
    </div>
 
    <div class="field-group">
      <label class="field-label" for="pix-key">Chave Pix</label>
      <input type="text" id="pix-key" placeholder="000.000.000-00" />
      <span class="error-msg" id="key-error">Chave inválida para o tipo selecionado.</span>
    </div>
 
    <div class="field-row">
      <div class="field-group">
        <label class="field-label" for="pix-name">Nome do recebedor</label>
        <input type="text" id="pix-name" placeholder="Ex: João Silva" maxlength="25" />
      </div>
      <div class="field-group">
        <label class="field-label" for="pix-city">Cidade</label>
        <input type="text" id="pix-city" placeholder="Ex: Curitiba" maxlength="15" />
      </div>
    </div>
 
    <div class="field-row">
      <div class="field-group">
        <label class="field-label" for="pix-amount">Valor (R$)</label>
        <input type="text" id="pix-amount" placeholder="0,00" />
      </div>
      <div class="field-group">
        <label class="field-label" for="pix-desc">Descrição</label>
        <input type="text" id="pix-desc" placeholder="Modelo do drone" maxlength="20" />
      </div>
    </div>
 
    <button class="generate-btn" id="gen-btn">Gerar QR Code / chave Pix</button>
 
    <div class="qr-result" id="qr-result">
      <div class="qr-inner">
        <div class="qr-info">
          <div class="qr-name" id="res-name"></div>
          <div class="qr-amount" id="res-amount"></div>
          <div class="qr-key" id="res-key"></div>
        </div>
        <div class="qr-box">
          <canvas id="qr-canvas" width="200" height="200"></canvas>
        </div>
        <div class="copy-area">
          <textarea class="copy-code" id="pix-payload" readonly></textarea>
          <button class="copy-btn" id="copy-btn">Copiar código Pix copia e cola</button>
        </div>
      </div>
    </div>
 
  </div>
</div>
 
<script>
  let keyType = 'cpf';
 
  document.querySelectorAll('.key-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.key-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      keyType = btn.dataset.type;
      const placeholders = {
        cpf: '000.000.000-00',
        cnpj: '00.000.000/0001-00',
        phone: '+55 (11) 99999-9999',
        email: 'email@exemplo.com',
        random: 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx'
      };
      document.getElementById('pix-key').placeholder = placeholders[keyType];
    });
  });
 
  function crc16(str) {
    let crc = 0xFFFF;
    for (let i = 0; i < str.length; i++) {
      crc ^= str.charCodeAt(i) << 8;
      for (let j = 0; j < 8; j++) {
        crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
      }
    }
    return ((crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0'));
  }
 
  function tlv(id, value) {
    return id + String(value.length).padStart(2, '0') + value;
  }
 
  function buildPixPayload(key, name, city, amount, txId, desc) {
    const merchantAccount =
      tlv('00', 'BR.GOV.BCB.PIX') +
      tlv('01', key) +
      (desc ? tlv('02', desc) : '');
    const ma = tlv('26', merchantAccount);
    const amountStr = amount ? tlv('54', parseFloat(amount).toFixed(2)) : '';
    const txIdStr = txId ? txId : '***';
    const addInfo = tlv('05', txIdStr);
    const ai = tlv('62', addInfo);
    const payload =
      tlv('00', '01') +
      ma +
      tlv('52', '0000') +
      tlv('53', '986') +
      amountStr +
      tlv('58', 'BR') +
      tlv('59', name.substring(0, 25)) +
      tlv('60', city.substring(0, 15)) +
      ai +
      '6304';
    return payload + crc16(payload);
  }
 
  function validateKey(key, type) {
    key = key.trim();
    if (!key) return false;
    if (type === 'cpf')    return /^\d{3}\.?\d{3}\.?\d{3}-?\d{2}$/.test(key);
    if (type === 'cnpj')   return /^\d{2}\.?\d{3}\.?\d{3}\/?\d{4}-?\d{2}$/.test(key);
    if (type === 'phone')  return /^\+?55?\s*\(?\d{2}\)?\s*9?\d{4}-?\d{4}$/.test(key);
    if (type === 'email')  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(key);
    if (type === 'random') return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(key);
    return false;
  }
 
  function cleanKey(key, type) {
    if (type === 'cpf') {
      const d = key.replace(/\D/g, '');
      return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    }
    if (type === 'cnpj') {
      const d = key.replace(/\D/g, '');
      return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    }
    if (type === 'phone') {
      let d = key.replace(/\D/g, '');
      if (d.startsWith('55')) d = d.slice(2);
      return '+55' + d;
    }
    return key.trim();
  }
 
  document.getElementById('gen-btn').addEventListener('click', () => {
    const rawKey   = document.getElementById('pix-key').value;
    const name     = document.getElementById('pix-name').value.trim()  || 'Recebedor';
    const city     = document.getElementById('pix-city').value.trim()  || 'Brasil';
    const amountRaw = document.getElementById('pix-amount').value.replace(',', '.').trim();
    const desc     = document.getElementById('pix-desc').value.trim();
    const errEl    = document.getElementById('key-error');
 
    if (!validateKey(rawKey, keyType)) {
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
 
    const key    = cleanKey(rawKey, keyType);
    const amount = amountRaw && !isNaN(parseFloat(amountRaw)) ? parseFloat(amountRaw) : null;
    const payload = buildPixPayload(key, name, city, amount, null, desc);
 
    document.getElementById('res-name').textContent   = name + ' · ' + city;
    document.getElementById('res-amount').textContent = amount
      ? 'R$ ' + amount.toFixed(2).replace('.', ',')
      : 'Valor em aberto';
    document.getElementById('res-key').textContent    = key;
    document.getElementById('pix-payload').value      = payload;
 
    const canvas = document.getElementById('qr-canvas');
    const ctx    = canvas.getContext('2d');
    ctx.clearRect(0, 0, 200, 200);
 
    try {
      const tempDiv = document.createElement('div');
      const qr = new QRCode(tempDiv, {
        text: payload,
        width: 200,
        height: 200,
        colorDark: '#000000',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.M
      });
      setTimeout(() => {
        const img = tempDiv.querySelector('img') || tempDiv.querySelector('canvas');
        if (img && img.tagName === 'IMG') {
          const i = new Image();
          i.onload = () => ctx.drawImage(i, 0, 0, 200, 200);
          i.src = img.src;
        } else if (img && img.tagName === 'CANVAS') {
          ctx.drawImage(img, 0, 0, 200, 200);
        }
      }, 100);
    } catch(e) {
      console.error('Erro ao gerar QR Code:', e);
    }
 
    const result = document.getElementById('qr-result');
    result.classList.add('show');
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });
 
  document.getElementById('copy-btn').addEventListener('click', () => {
    const ta = document.getElementById('pix-payload');
    ta.select();
    document.execCommand('copy');
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copiado!';
    setTimeout(() => btn.textContent = 'Copiar código Pix copia e cola', 2000);
  });
 
  document.getElementById('pix-amount').addEventListener('input', function() {
    this.value = this.value.replace(/[^\d,]/g, '');
  });
</script>
 
</body>
</html>
